name: Build DIE-engine

on:
  workflow_dispatch:
  release:
    types: [created]
  schedule:
    - cron: '0 0 * * MON'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  SRC_PATH: ${{ github.workspace }}/src
  SRC_PATH_WIN: ${{ github.workspace }}\src
  RELEASE_PATH: ${{ github.workspace }}/src/release

# the jobs are based on these notes:
# https://github.com/horsicq/Detect-It-Easy/blob/master/docs/BUILD.md
jobs:
  build-ubuntu-24:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install qtbase5-dev qtscript5-dev qttools5-dev-tools libqt5svg5-dev qtchooser qt5-qmake build-essential -y

      - name: Build
        working-directory: ${{ env.SRC_PATH }}
        run: |
          bash -x build_dpkg.sh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-ubuntu-24
          path: |
            ${{ env.RELEASE_PATH }}/*.deb
          if-no-files-found: error

  build-ubuntu-24-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install qtbase5-dev qtscript5-dev qttools5-dev-tools libqt5svg5-dev qtchooser qt5-qmake build-essential -y

      - name: Build
        working-directory: ${{ env.SRC_PATH }}
        run: |
          bash -x build_dpkg.sh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-ubuntu-24-arm
          path: |
            ${{ env.RELEASE_PATH }}/*.deb
          if-no-files-found: error

  build-ubuntu-22:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install qtbase5-dev qtscript5-dev qttools5-dev-tools libqt5svg5-dev qtchooser qt5-qmake build-essential -y

      - name: Build
        working-directory: ${{ env.SRC_PATH }}
        run: |
          bash -x build_dpkg.sh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-ubuntu-22
          path: |
            ${{ env.RELEASE_PATH }}/*.deb
          if-no-files-found: error

  build-windows-32:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win32_msvc2019'
          dir: ${{ github.workspace }}
          modules: qtscript

      - name: Build
        shell: cmd
        working-directory: ${{ env.SRC_PATH }}
        run: |
          set VSVARS_PATH="C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          set QMAKE_PATH="${{ github.workspace }}\Qt\5.15.2\msvc2019\bin\qmake.exe"
          set SEVENZIP_PATH="C:\Program Files\7-Zip\7z.exe"
          set INNOSETUP_PATH="C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          set X_BUILD_NAME=die
          set X_BUILD_PREFIX=win32
          set X_SOURCE_PATH=${{ env.SRC_PATH_WIN }}
          for /f "delims=" %%x in ('type "%X_SOURCE_PATH%\release_version.txt"') do set X_RELEASE_VERSION=%%x

          echo on
          call "%X_SOURCE_PATH%\build_win_generic_check.cmd"

          dir "%X_SOURCE_PATH%\release\*.zip" >nul 2>&1
          if %ERRORLEVEL% neq 0 (
            echo "ZIP file does not exist"
            exit /b 1
          )

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-windows-x86
          path: |
            ${{ env.RELEASE_PATH }}/*.zip
          if-no-files-found: error

  build-windows-64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: ${{ github.workspace }}
          modules: qtscript

      - name: Build
        shell: cmd
        working-directory: ${{ env.SRC_PATH }}
        run: |
          set VSVARS_PATH="C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set QMAKE_PATH="${{ github.workspace }}\Qt\5.15.2\msvc2019_64\bin\qmake.exe"
          set SEVENZIP_PATH="C:\Program Files\7-Zip\7z.exe"
          set INNOSETUP_PATH="C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          set X_BUILD_NAME=die
          set X_BUILD_PREFIX=win64
          set X_SOURCE_PATH=${{ env.SRC_PATH_WIN }}
          for /f "delims=" %%x in ('type "%X_SOURCE_PATH%\release_version.txt"') do set X_RELEASE_VERSION=%%x

          echo on
          call "%X_SOURCE_PATH%\build_win_generic_check.cmd"

          dir "%X_SOURCE_PATH%\release\*.zip" >nul 2>&1
          if %ERRORLEVEL% neq 0 (
            echo "ZIP file does not exist"
            exit /b 1
          )

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-windows-x64
          path: |
            ${{ env.RELEASE_PATH }}/*.zip
          if-no-files-found: error

  build-windows-64-qt6:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: ${{ env.SRC_PATH }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          dir: ${{ github.workspace }}
          modules: qt5compat

      - name: Build
        shell: cmd
        working-directory: ${{ env.SRC_PATH }}
        run: |
          set VSVARS_PATH="C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set QMAKE_PATH="${{ github.workspace }}\Qt\6.10.2\msvc2022_64\bin\qmake.exe"
          set SEVENZIP_PATH="C:\Program Files\7-Zip\7z.exe"
          set INNOSETUP_PATH="C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          set X_BUILD_NAME=die
          set X_BUILD_PREFIX=win64_qt6
          set X_SOURCE_PATH=${{ env.SRC_PATH_WIN }}
          for /f "delims=" %%x in ('type "%X_SOURCE_PATH%\release_version.txt"') do set X_RELEASE_VERSION=%%x

          echo on
          call "%X_SOURCE_PATH%\build_win_generic_qt6.cmd"

          dir "%X_SOURCE_PATH%\release\*.zip" >nul 2>&1
          if %ERRORLEVEL% neq 0 (
            echo "ZIP file does not exist"
            exit /b 1
          )

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-windows-x64-qt6
          path: |
            ${{ env.RELEASE_PATH }}/*.zip
          if-no-files-found: error

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm qt5-base qt5-script qt5-svg qt5-tools base-devel git
          pacman -S --noconfirm imagemagick

      - name: Create user
        run: |
          useradd builduser -m
          passwd -d builduser
          echo 'builduser ALL=(ALL) ALL' | tee -a /etc/sudoers

      - name: Clone DIE-engine
        run: |
          cd $HOME
          pwd
          git clone --recursive https://github.com/horsicq/DIE-engine

      - name: Build
        run: |
          sudo chown -R builduser /__w/DIE-engine/DIE-engine
          sudo chown -R builduser /github/home/DIE-engine
          cd /github/home/DIE-engine
          pwd
          sudo -u builduser bash -c 'bash -x build_archpkg.sh'
          rm -Rf /__w/DIE-engine/DIE-engine/release/*debug*
          rm -Rf /github/home/DIE-engine/release/*debug*

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: die-engine-arch
          path: |
            /github/home/DIE-engine/release/*.pkg.tar.zst
          if-no-files-found: error

  publish-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build-ubuntu-24
      - build-ubuntu-24-arm
      - build-ubuntu-22
      - build-windows-32
      - build-windows-64
      - build-windows-64-qt6
      - build-arch
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload Release as Download
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: Beta
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
